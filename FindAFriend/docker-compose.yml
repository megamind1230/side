services:
  postgres:
    image: postgres:17-alpine
    container_name: findafriend-db
    environment:
      POSTGRES_USER: findafriend
      POSTGRES_PASSWORD: findafriend_secret
      POSTGRES_DB: findafriend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findafriend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
